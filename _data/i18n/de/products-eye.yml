eye-text: "Die senseBox Eye erweitert die senseBox Mikrocontroller-Reihe um ein eigenständiges Board für bildverarbeitende, KI-nahe und kommunikationsstarke Anwendungen. Mit leistungsfähigem Prozessor und erweitertem Arbeitsspeicher ist sie fähig kleine KI-Modelle direkt auf dem Gerät auszuführen. Beispielsweise für Bilderkennung mit der integrierten Kamera oder Gestenerkennung mit dem integriertem Beschleunigungssensor. Dank WiFi, BLE und LoRa können Daten flexibel übertragen oder auf der SD-Karte gespeichert werden."

