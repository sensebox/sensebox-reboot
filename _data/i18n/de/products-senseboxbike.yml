campaigns:
  title: "senseBox:bike in deiner Stadt"
  schools-title: "Citizen Science mit Schulen"
  schools-text: |
    Die senseBox:bike ist ideal für den Einsatz in Schulen und Bildungseinrichtungen. Mit der senseBox:bike können Schüler:innen spannende Projekte rund um Umweltüberwachung und Nachhaltigkeit durchführen.
    - Beteiligung Jugendlicher
    - Projektwoche(n)
    - Datenerfassung in Quartieren
    - Zukunftswerkstätten
    - Erlangen von Datenkompetenzen
  citizen-title: "Citizen Science - Bürger:innenbeteiligung"
  citizen-text: |
    Die senseBox:bike ermöglicht Bürger:innen, aktiv an der Umweltüberwachung teilzunehmen und Daten für Projekte und Initiativen zu sammeln.
    - Workshops mit Bürger:innen (3-4h)
    - Zusammenbau der senseBox:bike
    - Montage am Fahrrad
    - Längerfriste Datenerfassung / Kampagne
    - Rohdaten auf der openSenseMap verfügbar
