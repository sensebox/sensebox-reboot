iframe-src: "https://3d.sensebox.de/bike"
heading: "Die senseBox:bike"
description: "Die senseBox:bike verwandelt dein Fahrrad in einen mobilen Umweltsensor. Damit kannst du während deiner Fahrt spannende Daten über deine Umgebung sammeln und Projekte rund um Umweltüberwachung und Nachhaltigkeit unterstützen. Mit modernen Sensoren und Echtzeitanalysen hilfst du dabei, städtische Herausforderungen datenbasiert anzugehen."
features:
  no-soldering-title: "🛠️ Kein Löten nötig"
  no-soldering-text: "Die senseBox:bike lässt sich super einfach zusammenbauen – perfekt für alle, egal ob Anfänger oder Profi."
  battery-title: "🔋 Akkulaufzeit"
  battery-text: "Mit einer Akkulaufzeit von 4-8 Stunden sammelst du während der ganzen Fahrt Daten, ohne dir Sorgen um den Akku machen zu müssen."
  sensors-title: "🌡️ Umweltsensoren"
  sensors-text: "Dank Sensoren für Temperatur, Luftfeuchtigkeit und Feinstaub bekommst du umfassende Umweltdaten direkt vom Rad."
  connectivity-title: "🛜 Konnektivität"
  connectivity-text: "Die Bluetooth Low Energy Verbindung sorgt dafür, dass du deine Daten unkompliziert mit der App synchronisieren kannst."
  ai-title: "✨ KI-Funktionen"
  ai-text: "Das integrierte Machine-Learning-Modell erkennt Überholmanöver und analysiert die Straßenqualität."
  proven-title: "🌎 Bewährt"
  proven-text: "Von Schulen bis zu Citizen-Science-Projekten – die senseBox:bike hat sich in Workshops und Projekten weltweit bewährt."
app:
  title: "senseBox:bike App"
  connect-title: "Verbinden"
  connect-text: "Verbinde dich mit deiner senseBox:bike und sieh deine Umgebungsdaten in Echtzeit."
  data-visualization-title: "Datenvisualisierung"
  data-visualization-text: "Erlebe deine Fahrtdaten live mit interaktiven Karten und Grafiken."
  ai-detection-title: "KI-Überholerkennung"
  ai-detection-text: "Schau dir an, wie das KI-Modell potenzielle Überholmanöver erkennt und visualisiert."
  trip-review-title: "Fahrtrückblick"
  trip-review-text: "Schau dir deine vergangenen Fahrten an und entdecke spannende Einblicke."
  data-export-title: "Datenexport"
  data-export-text: "Exportiere deine Fahrtdaten ganz einfach zur weiteren Analyse oder zum Teilen."
  privacy-zones-title: "Privatzonen"
  privacy-zones-text: "Erstelle Privatzonen, um deine Daten zu schützen und selbst zu entscheiden, was geteilt wird."
  video-error-text: "Dein Browser unterstützt das Video-Tag leider nicht."
ai-features:
  title: "✨ KI-Funktionen"
  description: "Die senseBox:bike ist mit KI-Funktionen ausgestattet, die datenbasierte Analysen ermöglichen. Mit Machine Learning auf dem Gerät kann die senseBox:bike Überholmanöver und Straßenbedingungen erkennen."
  overtaking-title: "Überholerkennung"
  overtaking-text: "Die senseBox:bike verwendet Machine Learning, um Überholfahrzeuge zu erkennen und die gesammelten Daten zu visualisieren."
  surface-classification-title: "Oberflächenklassifizierung"
  surface-classification-text: "Die senseBox:bike klassifiziert Straßenbedingungen und liefert wertvolle Einblicke für nachhaltige Mobilität."
history:
  title: "Die Geschichte der senseBox:bike"
  text: "Welche Daten soll die senseBox für das Fahrrad erheben, um Aussagen zur Fahrradinfrastruktur treffen zu können und wie muss das Gehäuse gestaltet sein, damit es an verschiedenen Fahrradtypen befestigt werden kann und auch auf ruckeligen Straßen hält? Schnell war klar, dass wir diese Fragen nicht allein beantworten können. Also haben wir gemeinsam mit dem Futurium Berlin, der Akademie der Bildenden Künste (ABK) Stuttgart und dem Fab Lab München bei einem Makeathon im Februar 2021 überlegt, wie die senseBox:bike aussehen soll und funktionieren könnte. So nahm die senseBox:bike seinen Lauf. Mehr zur Entstehungsgeschichte der senseBox:bike erfährst du in unserem Blogbeitrag."
  button-text: "Blogbeitrag"
