eye-text: "The powerful senseBox Eye is the latest development in the senseBox microcontroller series. With its powerful processor and increased memory, it enables the execution of small AI models directly on the device. For example, image recognition with the integrated camera or gesture recognition with the integrated accelerometer. Captured data can be transmitted directly via Wifi, BLE, or LoRa, or stored on an SD card."

